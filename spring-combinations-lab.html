<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Investigating Springs</title>
<style>
* { box-sizing: border-box; }
body {
margin: 0;
background: var(--lk-page-bg);
font-family: var(--lk-font-body);
font-size: var(--lk-base-size);
color: var(--lk-ink);
}
.lk-page {
max-width: 1020px;
margin: 0 auto;
padding: 28px 20px 48px;
display: flex;
flex-direction: column;
gap: 14px;
}
.lk-header { text-align: center; }
.lk-header h1 {
margin: 0;
font-family: var(--lk-font-heading);
font-size: 1.65em;
font-weight: 800;
color: var(--lk-ink);
}
.lk-subtitle {
margin: 5px 0 0;
font-size: 0.93em;
color: var(--lk-ink-muted);
}
.lk-card {
background: var(--lk-surface);
border: var(--lk-border-w) solid var(--lk-line);
border-radius: var(--lk-radius);
box-shadow: var(--lk-shadow);
}
.lk-controlbar {
position: relative;
padding: 14px 16px;
display: flex;
flex-wrap: wrap;
gap: 16px 22px;
align-items: end;
justify-content: space-between;
z-index: 10;
}
.lk-controls { display: flex; flex-wrap: wrap; gap: 16px 22px; }
.lk-field { display: flex; flex-direction: column; gap: 6px; }
.lk-label {
font-size: 0.73em;
font-weight: 800;
letter-spacing: 0.8px;
text-transform: uppercase;
color: var(--lk-ink-muted);
}
.lk-select {
padding: 9px 10px;
border-radius: calc(var(--lk-radius) - 2px);
border: var(--lk-border-w) solid var(--lk-line-strong);
background: var(--lk-surface-alt);
color: var(--lk-ink);
font-family: var(--lk-font-body);
font-size: 0.93em;
font-weight: 700;
cursor: pointer;
outline: none;
}
.lk-select:focus-visible { border-color: var(--lk-accent); }
.lk-buttons { display: flex; gap: 8px; }
.lk-btn {
padding: 10px 16px;
border-radius: calc(var(--lk-radius) - 1px);
border: var(--lk-border-w) solid var(--lk-line-strong);
background: var(--lk-surface-alt);
color: var(--lk-ink);
font-family: var(--lk-font-body);
font-size: 0.93em;
font-weight: 700;
cursor: pointer;
}
.lk-btn:focus-visible, .lk-btn-primary:focus-visible { outline: 2px solid var(--lk-accent); outline-offset: 1px; }
.lk-btn[aria-expanded="true"] { background: var(--lk-surface-raise); border-color: var(--lk-accent); }
.lk-btn-primary {
padding: 10px 26px;
border: none;
background: var(--lk-accent);
color: var(--lk-accent-contrast);
font-weight: 800;
box-shadow: 0 2px 0 var(--lk-accent-strong);
}
.lk-btn-primary:active { transform: translateY(1px); box-shadow: 0 1px 0 var(--lk-accent-strong); }
.lk-popover {
position: absolute;
top: 100%;
right: 0;
margin-top: 10px;
width: min(300px, 92vw);
padding: 18px 20px;
box-shadow: var(--lk-shadow-pop);
z-index: 50;
display: flex;
flex-direction: column;
gap: 15px;
}
.lk-popover[hidden] { display: none; }
.lk-popover-title {
font-size: 0.73em;
font-weight: 800;
letter-spacing: 0.8px;
text-transform: uppercase;
color: var(--lk-ink);
}
.lk-param { display: flex; flex-direction: column; gap: 5px; }
.lk-param[hidden] { display: none; }
.lk-param-label { font-size: 0.8em; font-weight: 700; color: var(--lk-ink-muted); }
.lk-param-value { color: var(--lk-accent-ink); }
.lk-param input[type="range"] { width: 100%; accent-color: var(--lk-accent); margin: 0; }
.lk-stage { position: relative; overflow: hidden; background: var(--lk-canvas-sky); }
.lk-stage canvas { display: block; width: 100%; height: auto; touch-action: none; }
.lk-stats {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
gap: 10px;
}
.lk-stat { padding: 12px 14px; }
.lk-stat[hidden] { display: none; }
.lk-stat-label {
font-size: 0.73em;
font-weight: 800;
letter-spacing: 0.8px;
text-transform: uppercase;
color: var(--lk-ink-muted);
}
.lk-stat-value {
font-family: var(--lk-font-mono);
font-size: 1.85em;
color: var(--lk-ink);
margin-top: 2px;
}
.lk-stat-unit { font-size: 0.5em; color: var(--lk-ink-muted); }
.lk-stat[data-variant="accent"] { background: var(--lk-surface-raise); border-color: var(--lk-accent-soft); }
.lk-stat[data-variant="accent"] .lk-stat-label,
.lk-stat[data-variant="accent"] .lk-stat-value { color: var(--lk-accent-ink); }
.lk-stat[data-variant="info"] { border-color: var(--lk-info-soft); }
.lk-stat[data-variant="info"] .lk-stat-label,
.lk-stat[data-variant="info"] .lk-stat-value { color: var(--lk-info); }
.lk-stat[data-state="live"] .lk-stat-value { color: var(--lk-good); }
.lk-note {
margin: 0;
text-align: center;
font-size: 0.87em;
font-weight: 600;
color: var(--lk-ink-muted);
}
.lk-error {
padding: 14px 16px;
border: 2px solid var(--lk-danger);
border-radius: var(--lk-radius);
background: var(--lk-surface);
color: var(--lk-danger);
font-family: var(--lk-font-mono);
font-size: 0.85em;
white-space: pre-wrap;
overflow-wrap: anywhere;
}
@media (max-width: 520px) {
.lk-page { padding: 16px 10px 32px; gap: 10px; }
.lk-controlbar { align-items: stretch; }
.lk-controls, .lk-buttons { width: 100%; }
.lk-buttons { justify-content: stretch; }
.lk-buttons .lk-btn, .lk-buttons .lk-btn-primary { flex: 1; }
.lk-select { width: 100%; }
.lk-field { flex: 1 1 100%; }
.lk-stats { grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); }
}
</style>

if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw || 1; ctx.stroke(); }
},
box3D(xa, xb, za, zb, y0, y1, col) {
const q = g.P;
g.poly([q(xa, za, y1), q(xb, za, y1), q(xb, zb, y1), q(xa, zb, y1)], shadeColor(col, 1.18));
g.poly([q(xb, za, y0), q(xb, za, y1), q(xb, zb, y1), q(xb, zb, y0)], shadeColor(col, 0.72));
const [f1x, f1y] = q(xa, za, y0), [f2x, f2y] = q(xb, za, y1);
const grad = ctx.createLinearGradient(0, f2y, 0, f1y);
grad.addColorStop(0, shadeColor(col, 1.02));
grad.addColorStop(1, shadeColor(col, 0.85));
ctx.fillStyle = grad;
ctx.fillRect(f1x, f2y, f2x - f1x, f1y - f2y);
ctx.strokeStyle = shadeColor(col, 0.65);
ctx.lineWidth = 1;
ctx.strokeRect(f1x, f2y, f2x - f1x, f1y - f2y);
},
text(str, x, y, o = {}) {
ctx.font = `${o.weight || 700} ${o.size || 13}px ${o.mono ? g.theme.fontMono : g.theme.fontBody}`;
ctx.textAlign = o.align || "left";
ctx.textBaseline = o.baseline || "alphabetic";
ctx.fillStyle = o.color || g.theme.ink;
ctx.fillText(str, x, y);
},
arrow(x1, y1, x2, y2, color, w = 3) {
ctx.strokeStyle = color; ctx.fillStyle = color;
ctx.lineWidth = w; ctx.lineCap = "round";
ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
const ang = Math.atan2(y2 - y1, x2 - x1), hs = Math.max(8, w * 3.3);
ctx.beginPath();
ctx.moveTo(x2, y2);
ctx.lineTo(x2 - hs * Math.cos(ang - 0.45), y2 - hs * Math.sin(ang - 0.45));
ctx.lineTo(x2 - hs * Math.cos(ang + 0.45), y2 - hs * Math.sin(ang + 0.45));
ctx.closePath(); ctx.fill();
},
callout(txt, tx, ty, lx, ly, alpha) {
const a = alpha !== undefined ? alpha : g.labelAlpha;
if (a < 0.02) return;
ctx.save();
ctx.globalAlpha = a;
ctx.strokeStyle = g.theme.muted; ctx.lineWidth = 1.2;
ctx.beginPath();
ctx.moveTo(lx, ly + (ly < ty ? 8 : -10));
ctx.lineTo(lx, (ly + ty) / 2);
ctx.lineTo(tx, ty);
ctx.stroke();
ctx.fillStyle = g.theme.muted;
ctx.beginPath(); ctx.arc(tx, ty, 2.5, 0, Math.PI * 2); ctx.fill();
g.text(txt, lx, ly + (ly < ty ? 6 : -6), {
size: 14, align: "center",
baseline: ly < ty ? "bottom" : "top",
color: shadeColor(g.theme.muted, 0.8)
});
ctx.restore();
},
graphInset(o) {
const x = o.x, y = o.y, w = o.w || 234, h = o.h || 150;
ctx.save();
ctx.globalAlpha = 0.96;
ctx.fillStyle = g.theme.surface;
ctx.strokeStyle = shadeColor(g.theme.ground, 0.95);
ctx.lineWidth = 1.5;
ctx.beginPath();
if (ctx.roundRect) ctx.roundRect(x, y, w, h, 10); else ctx.rect(x, y, w, h);
ctx.fill(); ctx.stroke();
if (o.title) g.text(o.title, x + 14, y + 10, { size: 11, weight: 800, color: g.theme.muted, baseline: "top" });
const ax = x + 36, ay = y + h - 24, aw = w - 52, ah = h - 58;
ctx.strokeStyle = g.theme.muted; ctx.lineWidth = 1;
ctx.beginPath();
ctx.moveTo(ax, ay - ah); ctx.lineTo(ax, ay); ctx.lineTo(ax + aw, ay);
ctx.stroke();
if (o.xLabel) g.text(o.xLabel, ax + aw + 4, ay - 4, { size: 10, color: g.theme.muted });
if (o.yLabel) g.text(o.yLabel, ax - 12, ay - ah - 2, { size: 10, color: g.theme.muted });
ctx.restore();
return { ax, ay, aw, ah, px: (fx) => ax + fx * aw, py: (fy) => ay - fy * ah };
}
};
return g;
}
function start(config, theme, SimClass, mount) {
const th = applyTheme(theme);
const chrome = buildChrome(config, mount);
const S = chrome.config.strings;
function fail(msg) {
chrome.showError(msg);
throw new Error("LabKit: " + msg);
}
if (typeof SimClass !== "function") fail("Sim class is missing or not a class.");
for (const m of ["reset", "step", "draw", "values"]) {
if (typeof SimClass.prototype[m] !== "function") fail(`Sim is missing required method ${m}()`);
}
const g = makeDrawKit(chrome, th);
let sim;
try {
sim = new SimClass(chrome.params());
} catch (e) {
fail("Sim constructor threw: " + (e && e.message ? e.message : e));
}
let state = "idle";
let t = 0;
let raf = 0;
let last = performance.now();
function setState(s) {
state = s;
chrome.setRunLabel(s === "running" ? S.pause : s === "done" ? S.runAgain : s === "paused" ? S.resume : S.start);
}
function hardReset() {
t = 0;
setState("idle");
try { sim.reset(chrome.params()); } catch (e) { die(e); }
}
function die(e) {
cancelAnimationFrame(raf);
chrome.showError((e && e.stack) ? e.stack.split("\n").slice(0, 4).join("\n") : String(e));
console.error(e);
}
chrome.onChange((id, v) => {
if (sim.onChange) { try { sim.onChange(id, v, chrome.params()); } catch (e) { die(e); return; } }
hardReset();
});
chrome.onReset(hardReset);
chrome.onRun(() => {
if (state === "done") { t = 0; try { sim.reset(chrome.params()); } catch (e) { die(e); return; } setState("running"); }
else if (state === "running") setState("paused");
else setState("running");
});
function frame(now) {
const dt = Math.min(0.05, (now - last) / 1000);
last = now;
try {
if (state === "running") {
t += dt;
if (sim.step(dt, t) === "done") setState("done");
}
const target = state === "running" ? 0.15 : 1;
g.labelAlpha += (target - g.labelAlpha) * Math.min(1, dt * 6);
g.t = t; g.dt = dt; g.state = state; g.params = chrome.params();
sim.draw(g);
const vals = sim.values() || {};
for (const [id, patch] of Object.entries(vals)) {
if (id === "_note") chrome.setNote(patch);
else chrome.setStat(id, patch);
}
} catch (e) {
die(e);
return;
}

}
hardReset();
raf = requestAnimationFrame(frame);

chrome, sim, drawKit: g,
state: () => state,
reset: hardReset,
stop: () => cancelAnimationFrame(raf)
};
}

/*__LK_SIM_BEGIN__*/
// BOX 7.1 — Investigating springs: hang a load from a single spring, two in
// series, or two in parallel (Figure 7.9); measure extension, get k_eq = F/x.
// Off-pack: support, coil springs, load block and ruler are hand-drawn.
const L0 = 0.25;        // natural length of one spring (m)
const SUP_Y = 0.86;     // underside of the wooden support (m)
const LAM = 1.6;        // damping rate of the settling oscillation (1/s)
const GRAV = 9.81;
const CX = 1.02;        // arrangement centreline (world m)
const RULER_X = 1.30;

class Sim {
  constructor(P) { this.reset(P); }

  keq() {
    const k = this.p.k, a = this.p.arrangement;
    return a === "series" ? k / 2 : a === "parallel" ? 2 * k : k;
  }
  natLen() { return this.p.arrangement === "series" ? 2 * L0 + 0.02 : L0; }

  reset(P) {
    this.p = P;
    this.F = P.mass * GRAV;
    this.extEq = this.F / this.keq();            // equilibrium extension
    this.om = Math.sqrt(this.keq() / P.mass);    // oscillation frequency
    this.doneT = Math.log(50) / LAM;             // settled to within 2%
    this.tNow = 0;
    this.running = false;
    this.finished = false;
    this.trace = [];
  }

  // --- physics: damped settle onto the new equilibrium (closed form) ---
  extAt(t) {
    if (t <= 0) return 0;
    return this.extEq * (1 - Math.exp(-LAM * t) * Math.cos(this.om * t));
  }

  step(dt, t) {
    if (!this.trace.length || t - this.trace[this.trace.length - 1][0] > 0.02) {
      this.trace.push([t, this.extAt(t)]);
    }
    if (t >= this.doneT) return "done";
  }

  // --- scene ---
  draw(g) {
    this.tNow = Math.min(g.t, this.doneT);
    this.running = g.state === "running";
    this.finished = g.state === "done";
    const ctx = g.ctx, arr = this.p.arrangement;
    const ext = this.extAt(this.tNow);

    g.clear();
    g.setView({ OX: 0, BY: 445, S: 440, TX: 150, TZ: 80 });

    // wooden support bar (as in Figure 7.9)
    g.box3D(0.72, 1.38, -0.06, 0.06, SUP_Y, SUP_Y + 0.045, "#E9CA9C");

    const yNat = SUP_Y - this.natLen();   // unstretched bottom position
    const yBot = yNat - ext;

    this.ruler(g, RULER_X, yNat);

    // dashed natural-length line + extension dimension arrow
    ctx.save();
    ctx.globalAlpha = Math.max(0.5, g.labelAlpha);
    const [n1x, n1y] = g.P(CX - 0.12, 0, yNat), [n2x] = g.P(RULER_X + 0.05, 0, yNat);
    ctx.strokeStyle = g.theme.muted; ctx.lineWidth = 1.4; ctx.setLineDash([5, 4]);
    ctx.beginPath(); ctx.moveTo(n1x, n1y); ctx.lineTo(n2x, n1y); ctx.stroke();
    ctx.setLineDash([]);
    if (ext > 0.004) {
      const [ax, ay1] = g.P(CX + 0.17, 0, yNat), [, ay2] = g.P(CX + 0.17, 0, yBot);
      g.arrow(ax, (ay1 + ay2) / 2, ax, ay1, g.theme.danger, 1.6);
      g.arrow(ax, (ay1 + ay2) / 2, ax, ay2, g.theme.danger, 1.6);
      g.text("x = " + Math.round(ext * 1000) + " mm", ax + 8, (ay1 + ay2) / 2,
             { size: 13, color: g.theme.danger, baseline: "middle" });
    }
    ctx.restore();

    if (arr === "parallel") {
      this.spring(g, CX - 0.05, SUP_Y, L0 + ext);
      this.spring(g, CX + 0.05, SUP_Y, L0 + ext);
      g.box3D(CX - 0.075, CX + 0.075, -0.015, 0.015, yBot - 0.018, yBot, "#C8CDD2");
      this.mass(g, CX, yBot - 0.018);
    } else if (arr === "series") {
      const each = L0 + ext / 2;
      this.spring(g, CX, SUP_Y, each);
      const [lx, ly] = g.P(CX, 0, SUP_Y - each - 0.01);
      ctx.fillStyle = "#7A848D";
      ctx.beginPath(); ctx.arc(lx, ly, 4, 0, Math.PI * 2); ctx.fill();
      this.spring(g, CX, SUP_Y - each - 0.02, each);
      this.mass(g, CX, yBot);
    } else {
      this.spring(g, CX, SUP_Y, L0 + ext);
      this.mass(g, CX, yBot);
    }

    // callouts: static labels top strip; the load moves, so it goes bottom strip
    g.callout("wooden support", ...g.P(0.80, 0, SUP_Y + 0.02), 140, 30);
    g.callout(arr === "single" ? "spring" : "identical springs",
              ...g.P(CX + (arr === "parallel" ? 0.06 : 0.016), 0, SUP_Y - L0 * 0.55), 330, 30);
    g.callout("load", ...g.P(CX + 0.03, -0.03, yBot - 0.035), 470, 452);
    g.callout("ruler (mm)", ...g.P(RULER_X + 0.015, 0, yNat - 0.2), 660, 452);

    // extension–time inset (shows the overshoot dying away)
    if (this.trace.length > 1) {
      const box = g.graphInset({ x: 706, y: 16, w: 272, h: 152,
                                 title: "EXTENSION–TIME", xLabel: "t", yLabel: "x" });
      const yMax = this.extEq * 1.9 || 1;
      ctx.strokeStyle = g.theme.info; ctx.lineWidth = 2; ctx.beginPath();
      this.trace.forEach(([tt, xx], i) => {
        const x = box.px(tt / this.doneT), y = box.py(xx / yMax);
        i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
      });
      ctx.stroke();
    }
  }

  // coil spring drawn as a zigzag between square ends (grey metal, like Figure 7.9)
  spring(g, cx, yTop, len) {
    const ctx = g.ctx, r = 0.016, coils = 12;
    ctx.strokeStyle = "#5A6570";
    ctx.lineWidth = 2.4;
    ctx.lineJoin = "round";
    ctx.beginPath();
    const [p0x, p0y] = g.P(cx, 0, yTop); ctx.moveTo(p0x, p0y);
    const [p1x, p1y] = g.P(cx, 0, yTop - 0.018); ctx.lineTo(p1x, p1y);
    const segTop = yTop - 0.018, segLen = len - 0.036, N = coils * 2;
    for (let i = 1; i <= N; i++) {
      const [px, py] = g.P(cx + (i % 2 ? -r : r), 0, segTop - segLen * i / N);
      ctx.lineTo(px, py);
    }
    const [p2x, p2y] = g.P(cx, 0, yTop - len + 0.018); ctx.lineTo(p2x, p2y);
    const [p3x, p3y] = g.P(cx, 0, yTop - len); ctx.lineTo(p3x, p3y);
    ctx.stroke();
  }

  // blue load block hanging with its top at topY (like Figure 7.9's block)
  mass(g, cx, topY) {
    g.box3D(cx - 0.042, cx + 0.042, -0.032, 0.032, topY - 0.07, topY, "#9DB6CD");
  }

  // ruler with zero aligned to the unstretched spring bottom — reads x directly
  ruler(g, x, yZero) {
    const ctx = g.ctx;
    const [px, py] = g.P(x, 0, yZero + 0.02);
    const wPx = 26, hPx = 0.42 * 440;
    ctx.save();
    ctx.fillStyle = g.theme.surface;
    ctx.strokeStyle = g.shade(g.theme.ground, 0.85);
    ctx.lineWidth = 1;
    ctx.fillRect(px, py, wPx, hPx);
    ctx.strokeRect(px, py, wPx, hPx);
    const [, pyZero] = g.P(x, 0, yZero);
    for (let cm = 0; cm <= 38; cm++) {
      const ty = pyZero + cm * 0.01 * 440;
      if (ty > py + hPx - 4) break;
      const major = cm % 5 === 0;
      ctx.strokeStyle = g.theme.muted;
      ctx.beginPath(); ctx.moveTo(px, ty); ctx.lineTo(px + (major ? 10 : 6), ty); ctx.stroke();
      if (major) {
        ctx.fillStyle = g.theme.muted;
        ctx.font = "9px " + g.theme.fontMono;
        ctx.textAlign = "left"; ctx.textBaseline = "middle";
        ctx.fillText(String(cm), px + 12, ty);
      }
    }
    ctx.restore();
  }

  // --- dashboard ---
  values() {
    const ext = this.extAt(this.tNow);
    const extMm = Math.round(ext * 1000);       // read off the ruler to the nearest mm
    const arr = this.p.arrangement;
    return {
      force: (this.F).toFixed(2),
      ext: { value: String(extMm), live: this.running },
      kmeas: { value: this.finished && extMm > 0 ? (this.F / (extMm / 1000)).toFixed(1) : "—",
               label: "Measured k_eq = F ÷ x" },
      kpred: { value: this.finished ? this.keq().toFixed(1) : "?",
               label: this.finished ? "Predicted k_eq (revealed)" : "Predicted k_eq — your guess?" },
      _note: arr === "series"
        ? "Two identical springs end-to-end: EACH spring feels the full load F, so each stretches by F/k. Predict k_eq, then run to check."
        : arr === "parallel"
        ? "Two identical springs side-by-side: each spring supports HALF the load. Predict k_eq, then run to check."
        : "Hooke's law: F = kx. Hang the load, wait for it to settle, and k = F ÷ x."
    };
  }
}

/*__LK_SIM_END__*/
LabKit.start(CONFIG, THEME, Sim, document.getElementById("lab-root"));
</script>
